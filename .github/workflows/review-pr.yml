name: AI Review Java Template PR

# pull_request_target를 사용해야 fork PR도 write 권한으로 머지 가능
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 보안: 베이스 브랜치 코드만 체크아웃합니다.
      # PR 파일 내용은 GitHub API(raw_url)로 가져오므로 HEAD 체크아웃 불필요.
      - name: Checkout base branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/review_java_pr.py
